syntax = "proto3";

package users.v1;

option go_package = "users/pkg/proto;userspb";

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_USER = 2;
}

message User {
  string id = 1;
  string phone = 2;
  Role role = 3;
  string created_at = 4;
  string updated_at = 5;
}

message RegisterRequest {
  string phone = 1;
  string password = 2;
  Role role = 3;
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string phone = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

