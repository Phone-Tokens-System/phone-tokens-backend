version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: users-postgres
    environment:
      POSTGRES_USER: users
      POSTGRES_PASSWORD: users
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./database/users:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users"]
      interval: 5s
      timeout: 5s
      retries: 10

  users:
    build:
      context: ./users
    container_name: users-service
    environment:
      HTTP_PORT: "8080"
      JWT_SECRET: "dev-secret-change-me"
      JWT_EXPIRES_IN_SEC: "3600"
      DATABASE_URL: "postgres://users:users@db:5432/users?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  users-db-data:

