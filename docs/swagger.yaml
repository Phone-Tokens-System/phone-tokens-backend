definitions:
  dto.BalanceRequest:
    properties:
      agent_id:
        type: string
      amount:
        type: number
    type: object
  dto.BindTokenRequest:
    properties:
      agent_id:
        type: string
      token_name:
        type: string
    type: object
  dto.BuyPackageRequest:
    properties:
      pkg_id:
        type: string
    type: object
  dto.CSRRequest:
    properties:
      agent_id;omitempty:
        type: string
      csr:
        type: string
      email:
        type: string
    type: object
  dto.CertificateResponse:
    properties:
      certificate:
        type: string
      csr_id:
        type: integer
    type: object
  dto.CountryDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.Filter:
    properties:
      key:
        type: string
      option_source:
        type: string
      options:
        items:
          type: string
        type: array
      type:
        type: string
    type: object
  dto.FilterRequest:
    properties:
      filters:
        additionalProperties:
          type: string
        type: object
    type: object
  dto.FilterResponse:
    properties:
      filters:
        items:
          $ref: '#/definitions/dto.Filter'
        type: array
    type: object
  dto.RegionDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.SmsFilterRequest:
    properties:
      agent_id:
        type: string
      certificate:
        type: string
      filters:
        $ref: '#/definitions/dto.FilterRequest'
      service_name:
        type: string
      text:
        type: string
    type: object
  dto.SmsId:
    properties:
      id:
        type: integer
    type: object
  dto.SmsLog:
    properties:
      cost:
        type: number
      date_created:
        type: integer
      date_sent:
        type: integer
      from:
        type: string
      service_id:
        type: string
      service_name:
        type: string
      status:
        type: string
      text:
        type: string
      token:
        type: string
    type: object
  dto.TokenRequest:
    properties:
      token:
        type: string
    type: object
  dto.UserProfile:
    properties:
      age:
        type: integer
      birth_date:
        type: string
      city:
        type: string
      country:
        type: string
      education:
        type: string
      gender:
        type: string
      region:
        type: string
      token:
        type: string
    type: object
  dto.UserProfileRequest:
    properties:
      birth_date:
        type: string
      city:
        type: string
      country:
        type: string
      education:
        type: string
      gender:
        type: string
      region:
        type: string
    type: object
  http.createTokenRequest:
    properties:
      agent_id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/model.TokenPermission'
        type: array
      ttl_seconds:
        type: integer
    type: object
  http.loginRequest:
    properties:
      password:
        type: string
      phone:
        type: string
    type: object
  http.loginResponse:
    properties:
      token:
        type: string
    type: object
  http.registerResponse:
    properties:
      id:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/model.Role'
    type: object
  http.tokenResponse:
    properties:
      agent_id:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/model.TokenPermission'
        type: array
      status:
        $ref: '#/definitions/model.TokenStatus'
      token:
        type: string
    type: object
  http.updateTokenRequest:
    properties:
      ttl_seconds:
        type: integer
    type: object
  model.AgentPackages:
    properties:
      agent_id:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      package_id:
        type: string
      service_type:
        $ref: '#/definitions/model.ServiceType'
      status:
        type: string
      units_total:
        type: integer
      units_used:
        type: integer
    type: object
  model.CsrRequest:
    properties:
      agent_id;omitempty:
        type: string
      csr:
        items:
          type: integer
        type: array
      email:
        type: string
      id:
        type: integer
      service_name:
        type: string
      status:
        type: string
    type: object
  model.Package:
    properties:
      id:
        type: string
      name:
        type: string
      price:
        type: number
      service:
        $ref: '#/definitions/model.ServiceType'
      units:
        type: integer
    type: object
  model.Role:
    enum:
    - admin
    - user
    - agent
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
    - RoleAgent
  model.ServiceType:
    enum:
    - SMS
    - Call
    type: string
    x-enum-varnames:
    - SMS
    - Call
  model.SmsRequest:
    properties:
      agent_id:
        type: string
      certificate:
        type: string
      client_token:
        type: string
      service_name:
        type: string
      text:
        type: string
    type: object
  model.SmsResponse:
    properties:
      cost:
        type: number
      date_created:
        type: integer
      date_sent:
        type: integer
      extend_status:
        type: string
      external_id:
        type: string
      from:
        type: string
      id:
        type: string
      raw:
        items:
          type: integer
        type: array
      service_id:
        type: string
      service_name:
        type: string
      status:
        type: integer
      text:
        type: string
      token:
        type: string
    type: object
  model.SmsStatus:
    properties:
      extend_status:
        type: string
      number:
        type: string
      service_name:
        type: string
      status:
        type: integer
    type: object
  model.TokenPermission:
    enum:
    - sms
    - calls
    type: string
    x-enum-varnames:
    - TokenPermissionSMS
    - TokenPermissionCalls
  model.TokenStatus:
    enum:
    - active
    - frozen
    type: string
    x-enum-varnames:
    - TokenStatusActive
    - TokenStatusFrozen
  model.UserProfile:
    properties:
      age:
        type: integer
      birth_date:
        type: string
      city:
        type: string
      country:
        type: string
      education:
        type: string
      gender:
        type: string
      region:
        type: string
      user_id:
        type: string
    type: object
  users.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/model.Role'
      service_name:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/admin/csr:
    get:
      consumes:
      - application/json
      description: Returns all pending Certificate Signing Requests
      produces:
      - application/json
      responses:
        "200":
          description: List of CSR requests
          schema:
            items:
              $ref: '#/definitions/dto.CSRRequest'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all pending CSR requests
      tags:
      - CSR
    post:
      consumes:
      - application/json
      description: Accepts a Certificate Signing Request from an agent
      parameters:
      - description: CSR Request payload
        in: body
        name: csr
        required: true
        schema:
          $ref: '#/definitions/dto.CSRRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Signed certificate
          schema:
            $ref: '#/definitions/dto.CertificateResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Accept a new CSR request
      tags:
      - CSR
  /api/v1/admin/csr/approve/{id}:
    post:
      consumes:
      - application/json
      description: Approves a CSR request by its ID and signs the certificate
      parameters:
      - description: CSR Request ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Signed certificate
          schema:
            $ref: '#/definitions/model.CsrRequest'
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Approve a CSR request
      tags:
      - CSR
  /api/v1/agents/{agent_id}/packages:
    get:
      consumes:
      - application/json
      description: Возвращает все пакеты, купленные агентом
      parameters:
      - description: ID агента
        in: path
        name: agent_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.AgentPackages'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить пакеты агента
      tags:
      - Billing
    post:
      consumes:
      - application/json
      description: Агент покупает пакет услуг (например SMS или звонки)
      parameters:
      - description: ID агента
        in: path
        name: agent_id
        required: true
        type: string
      - description: Данные покупки пакета
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BuyPackageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: package purchased
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Купить пакет
      tags:
      - Billing
  /api/v1/agents/tokens/user-profile:
    get:
      description: Возвращает список пользователей, чьи токены привязаны к агенту
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserProfile'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить пользователей агента
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: Возвращает профиль пользователя по токену
      parameters:
      - description: Токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить профиль по токену
      tags:
      - user-profile
  /api/v1/agents/tokens/user-profile/filtered:
    post:
      consumes:
      - application/json
      description: Возвращает пользователей агента с применением фильтров
      parameters:
      - description: Фильтры пользователей
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.FilterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserProfile'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Фильтрация пользователей агента
      tags:
      - agents
  /api/v1/billing/{agent_id}/balance:
    get:
      consumes:
      - application/json
      description: Возвращает float64 баланс агента по его ID
      parameters:
      - description: ID агента
        in: path
        name: agent_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Баланс агента
          schema:
            additionalProperties:
              format: float64
              type: number
            type: object
        "404":
          description: Агент не найден
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить текущий баланс агента
      tags:
      - Billing
  /api/v1/billing/balance:
    post:
      consumes:
      - application/json
      description: Создает checkout-сессию на Stripe и возвращает URL для редиректа
      parameters:
      - description: Request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: URL для редиректа на Stripe Checkout
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Некорректный запрос
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать Stripe Checkout session для пополнения баланса
      tags:
      - Billing
  /api/v1/billing/webhook:
    post:
      consumes:
      - application/json
      description: Получает уведомления о событиях Stripe, например успешной оплате
        checkout session
      parameters:
      - description: Stripe Signature
        in: header
        name: stripe-signature
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Webhook обработан успешно
        "400":
          description: Некорректный payload или подпись
      summary: Обработка Stripe Webhook
      tags:
      - Billing
  /api/v1/csr/signed:
    get:
      consumes:
      - application/json
      description: Returns the signed certificate for the given CSR ID
      parameters:
      - description: CSR ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Signed certificate
          schema:
            $ref: '#/definitions/dto.CertificateResponse'
        "400":
          description: Invalid CSR ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get signed certificate by CSR ID
      tags:
      - CSR
  /api/v1/csr/upload:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a CSR from an agent as a file upload
      parameters:
      - description: CSR file
        in: formData
        name: csr
        required: true
        type: file
      - description: Email of requester
        in: formData
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Signed certificate
          schema:
            $ref: '#/definitions/dto.CertificateResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload a Certificate Signing Request (CSR) file
      tags:
      - CSR
  /api/v1/dictionary/cities:
    get:
      consumes:
      - application/json
      description: список городов
      parameters:
      - description: ID страны
        in: query
        name: country
        required: true
        type: string
      - description: ID региона
        in: query
        name: region
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RegionDTO'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить список городов по ид региона и ид страны
      tags:
      - dictionary
  /api/v1/dictionary/countries:
    get:
      consumes:
      - application/json
      description: список стран
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CountryDTO'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить список стран
      tags:
      - dictionary
  /api/v1/dictionary/regions:
    get:
      consumes:
      - application/json
      description: список регионов
      parameters:
      - description: ID страны
        in: query
        name: country
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RegionDTO'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить список регионов страны по ид
      tags:
      - dictionary
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Authenticates user with phone and password and returns a JWT token
      parameters:
      - description: User login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT token
          schema:
            $ref: '#/definitions/http.loginResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login a user
      tags:
      - User
  /api/v1/packages:
    get:
      consumes:
      - application/json
      description: Возвращает список всех пакетов, которые агент может купить
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Package'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить список доступных пакетов
      tags:
      - Billing
  /api/v1/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with phone, password and role
      parameters:
      - description: User registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User successfully registered
          schema:
            $ref: '#/definitions/http.registerResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Phone already used
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - User
  /api/v1/sms/agents/{agentId}:
    get:
      consumes:
      - application/json
      description: Returns list of sms
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: SMS status details
          schema:
            items:
              $ref: '#/definitions/model.SmsResponse'
            type: array
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: get sms sent by agent by id
      tags:
      - SMS
  /api/v1/sms/agents/logs:
    get:
      consumes:
      - application/json
      description: Returns all sms logs with given agent id
      parameters:
      - description: agent ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Signed certificate
          schema:
            $ref: '#/definitions/dto.SmsLog'
        "400":
          description: Invalid agent ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get sms logs for given agent
      tags:
      - Agents
  /api/v1/sms/all:
    get:
      consumes:
      - application/json
      description: Returns list of sms
      produces:
      - application/json
      responses:
        "200":
          description: SMS status details
          schema:
            items:
              $ref: '#/definitions/model.SmsResponse'
            type: array
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: get sms sent by provider
      tags:
      - SMS
  /api/v1/sms/logs:
    get:
      consumes:
      - application/json
      description: Returns the list of all sent SMS
      produces:
      - application/json
      responses:
        "200":
          description: List of sent SMS
          schema:
            items:
              $ref: '#/definitions/model.SmsResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all SMS
      tags:
